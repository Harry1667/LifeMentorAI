syntax = "proto3";

package aiproxy;

service AIProxy {
  // 一元完成請求
  rpc Complete(CompletionRequest) returns (CompletionResponse);
  // 串流完成請求
  rpc StreamComplete(CompletionRequest) returns (stream CompletionChunk);
  // 查詢用量統計
  rpc GetUsage(UsageRequest) returns (UsageResponse);
  // 健康檢查
  rpc HealthCheck(Empty) returns (HealthResponse);
  // 取得模型設定
  rpc GetModelConfig(GetModelConfigRequest) returns (GetModelConfigResponse);
}

// 認證 token 透過 gRPC metadata 傳遞："authorization: Bearer <token>"

message CompletionRequest {
  string provider = 1;    // "claude" 或 "gemini"
  string model = 2;       // 例如 "claude-opus-4-6", "gemini-2.5-pro"
  string prompt = 3;
  string system = 4;      // 可選的 system prompt
  int32 max_tokens = 5;
  string project = 6;     // 可選，專案名稱（如 "work-A", "work-B"），用於分開統計用量
  string group = 7;       // 可選，小組名稱（如 "frontend", "backend"），自動建立，用於細分用量統計
  string tier = 8;            // "best"/"good"/"basic" — server 解析成具體模型（與 model 二選一）
  string usage_type = 9;      // "text"/"image"/"video"/"tts"/"music"（預設 "text"）
}

message CompletionResponse {
  string content = 1;
  int32 input_tokens = 2;
  int32 output_tokens = 3;
  bool tokens_estimated = 4;
  float latency_ms = 5;
  string actual_model = 6;    // server 實際使用的模型
  string actual_provider = 7; // server 實際使用的 provider
}

message CompletionChunk {
  string delta = 1;
  bool done = 2;
  int32 input_tokens = 3;   // 除最後一塊（done=true）外都是零
  int32 output_tokens = 4;  // 除最後一塊（done=true）外都是零
  bool tokens_estimated = 5;
}

message UsageRequest {
  string user = 1;         // 可選篩選
  string provider = 2;     // 可選篩選
  int32 days = 3;          // 回顧期間，預設 7 天
  string project = 4;      // 可選篩選，按專案查詢用量
  string group = 5;        // 可選篩選，按小組查詢用量
}

message UsageResponse {
  int32 total_requests = 1;
  int32 total_input_tokens = 2;
  int32 total_output_tokens = 3;
  repeated DailyUsage daily = 4;
}

message DailyUsage {
  string date = 1;
  int32 requests = 2;
  int32 input_tokens = 3;
  int32 output_tokens = 4;
  string project = 5;     // 按專案查詢時才有值
}

message Empty {}

message HealthResponse {
  bool claude_available = 1;
  bool gemini_available = 2;
  bool claude_auth_ok = 3;
  bool gemini_auth_ok = 4;
  int32 claude_pool_idle = 5;
  int32 gemini_pool_idle = 6;
}

message GetModelConfigRequest {
  string project = 1;        // 可選，帶了就回傳專案級設定
}

message ModelInfo {
  string provider = 1;
  string model_id = 2;
  string display_name = 3;
  string usage_type = 4;
  string quality = 5;
  string speed = 6;
  string cost = 7;
  repeated string capabilities = 8;
  int32 context_window = 9;
}

message GetModelConfigResponse {
  repeated ModelInfo models = 1;
  map<string, string> project_config = 2;
}
